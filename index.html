<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PingPongLab | Best Table Tennis Rubber Comparison Tool</title>
    <meta name="description" content="Compare table tennis rubbers by speed, spin, control, hardness, and weight. PingPongLab helps players find the best ping pong rubber for their style.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://pingponglab.com/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PingPongLab">
    <meta property="og:title" content="PingPongLab | Best Table Tennis Rubber Comparison Tool">
    <meta property="og:description" content="Explore and compare table tennis rubbers with interactive filters and detailed descriptions.">
    <meta property="og:url" content="https://pingponglab.com/">
    <meta property="og:image" content="https://pingponglab.com/images/share-preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="PingPongLab logo on dark background">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PingPongLab | Best Table Tennis Rubber Comparison Tool">
    <meta name="twitter:description" content="Find your ideal table tennis rubber with data-driven comparison charts.">
    <meta name="twitter:image" content="https://pingponglab.com/images/share-preview.png">
    <meta name="twitter:image:alt" content="PingPongLab logo on dark background">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="icon" href="images/favicon.ico?v=1" type="image/x-icon">
    <link rel="stylesheet" href="styles.css?v=1">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "PingPongLab",
            "url": "https://pingponglab.com/",
            "description": "Table tennis rubber comparison site with filters for speed, spin, control, hardness, and weight.",
            "potentialAction": {
                "@type": "SearchAction",
                "target": "https://pingponglab.com/?q={search_term_string}",
                "query-input": "required name=search_term_string"
            }
        }
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F2QMQTQXMK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-F2QMQTQXMK');
    </script>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="header-row">
                <div class="header-brand">
                    <img src="images/ci.png" alt="PingPong Lab" class="header-logo" id="homeLogo" role="button" tabindex="0" aria-label="Reset view">
                    <div class="header-text">
                        <h1 class="header-title">Best Ping Pong Rubber</h1>
                        <p class="header-tagline">Showing</p>
                    </div>
                </div>
                <div class="header-controls">
                    <div class="country-selector" id="countrySelector">
                        <button type="button" class="country-btn active" data-country="us" title="USA" aria-label="USA">🇺🇸</button>
                        <button type="button" class="country-btn" data-country="eu" title="Europe" aria-label="Europe">🇪🇺</button>
                        <button type="button" class="country-btn" data-country="cn" title="China" aria-label="China">🇨🇳</button>
                        <button type="button" class="country-btn" data-country="kr" title="Korea" aria-label="Korea">🇰🇷</button>
                    </div>
                </div>
            </div>
            <div class="header-accent"></div>
        </header>
        <div class="chart-bleed">
            <div class="chart-speed-outside" aria-hidden="true">⚡ Speed ↑</div>
            <div id="chart"></div>
            <div class="chart-control-guide" aria-label="Control indicator guide">
                <span class="zoom-hint" id="zoomHint" aria-live="polite">Zoom in for more rubbers</span>
                <span class="chart-control-guide-label">Less</span>
                <span class="chart-control-guide-dots" aria-hidden="true">
                    <span class="chart-control-guide-dot dot-1"></span>
                    <span class="chart-control-guide-dot dot-2"></span>
                    <span class="chart-control-guide-dot dot-3"></span>
                    <span class="chart-control-guide-dot dot-4"></span>
                    <span class="chart-control-guide-dot dot-5"></span>
                </span>
                <span class="chart-control-guide-label">More control</span>
                <span class="chart-spin-label" aria-hidden="true">↻ Spin →</span>
            </div>
        </div>

        <div class="filter-panel" id="filterPanel">
            <button type="button" class="filter-trigger" id="filterTrigger" aria-expanded="false" aria-controls="filterPanel">
                <span class="filter-trigger-icon">≡</span>
                <span class="filter-trigger-label">Filters</span>
                <span class="filter-trigger-summary" id="filterSummary"></span>
                <span class="filter-trigger-chevron">▾</span>
            </button>
            <div class="filter-panel-body" id="filterPanelBody">
                <div class="filter-panel-grid">
                    <!-- Column 1: Weight, Hardness, Sheet, Control -->
                    <div class="fp-section fp-section-sliders">
                        <div class="fp-section-header">
                            <span>Weight</span>
                            <div class="fp-section-actions">
                                <button type="button" id="weightResetBtn">Reset</button>
                            </div>
                        </div>
                        <div class="fp-options" id="weightFilter"></div>

                        <div class="fp-section-header fp-section-header-sub">
                            <span>Hardness</span>
                            <div class="fp-section-actions">
                                <button type="button" id="hardnessResetBtn">Reset</button>
                            </div>
                        </div>
                        <div class="fp-options" id="hardnessFilter"></div>

                        <div class="fp-section-header fp-section-header-sub"><span>Sheet</span></div>
                        <div class="fp-options" id="sheetFilter"></div>

                        <div class="fp-section-header fp-section-header-sub"><span>Control</span></div>
                        <div class="fp-options" id="controlFilter"></div>
                    </div>

                    <!-- Column 2: Brand -->
                    <div class="fp-section fp-section-brand">
                        <div class="fp-section-header">
                            <span>Brand</span>
                            <div class="fp-section-actions">
                                <button type="button" data-filter="brand" data-action="all">All</button>
                                <button type="button" data-filter="brand" data-action="none">None</button>
                            </div>
                        </div>
                        <div class="fp-options fp-options-no-scroll" id="brandFilter"></div>
                    </div>

                    <!-- Column 3: Rubber -->
                    <div class="fp-section fp-section-rubber">
                        <div class="fp-section-header fp-rubber-header" id="rubberSectionToggle">
                            <span>Rubber <span class="fp-rubber-toggle-hint">▸</span></span>
                            <div class="fp-section-actions">
                                <button type="button" data-filter="name" data-action="all">All</button>
                                <button type="button" data-filter="name" data-action="none">None</button>
                            </div>
                        </div>
                        <div class="fp-rubber-content" id="rubberContent">
                            <input class="fp-search" id="nameSearch" type="search" placeholder="Search rubber…">
                            <div class="fp-options" id="nameFilter"></div>
                        </div>
                    </div>
                </div>
                <div class="filter-panel-footer">
                    <button type="button" class="filter-action-btn reset-btn filter-reset-btn" id="clearAllFilters" title="Reset all filters">
                        ↺ Reset all
                    </button>
                </div>
            </div>
        </div>



        <div id="radarSection" class="radar-section">
            <div id="radarChart" class="radar-chart"></div>
            <div id="radarInfoPanel" class="radar-info-combined"></div>
        </div>

        <div class="content-card" id="contentCard">
            <div class="content-tabs" id="contentTabs"></div>
            <div class="content-body" id="contentBody">
                <div class="content-pane content-pane--empty" id="contentPane">
                    <span class="content-pane-placeholder"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5;vertical-align:-2px;margin-right:4px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Select a rubber</span>
                </div>
            </div>
        </div>

        <footer class="site-footer">
            <div class="site-footer-content">
                <span>© 2026 aiMiniLabs</span>
                <button class="footer-feedback-btn" id="feedbackOpenBtn" title="Send feedback">✉ Feedback</button>
            </div>
        </footer>
    </div>

    <div class="feedback-modal" id="feedbackModal" aria-hidden="true">
        <div class="feedback-modal-card" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
            <button type="button" class="feedback-modal-close" id="feedbackCloseBtn" aria-label="Close feedback form">×</button>
            <h2 id="feedbackTitle">Share feedback</h2>
            <p class="feedback-intro">We’ll get back to you as soon as possible.</p>
            <form class="feedback-form" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="209c243c-c02d-4523-8587-1fe225a6cad3">
                <input type="hidden" name="subject" value="PingPong Lab user feedback">
                <input type="checkbox" name="botcheck" class="feedback-botcheck" tabindex="-1" autocomplete="off">

                <label for="feedbackEmail">Email</label>
                <input id="feedbackEmail" type="email" name="email" autocomplete="email" placeholder="you@example.com" required>

                <label for="feedbackMessage">Message</label>
                <textarea id="feedbackMessage" name="message" rows="5" placeholder="Share your feedback or suggestions." required></textarea>

                <button type="submit">Send feedback</button>
            </form>
            <div class="feedback-confirmation" id="feedbackConfirmation" hidden>
                <p class="feedback-confirmation-icon" aria-hidden="true">✓</p>
                <p class="feedback-confirmation-message" id="feedbackConfirmationMessage">Thank you for your feedback.</p>
            </div>
        </div>
    </div>

    <script src="app.js?v=1"></script>
</body>
</html>
